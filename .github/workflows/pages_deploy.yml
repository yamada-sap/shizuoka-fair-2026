name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 手動での再デプロイ用

# GitHub Pagesへのデプロイに必要なアクセス権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行による競合を防ぐための設定
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # コミットメッセージに '[deploy]' が含まれるか、手動(workflow_dispatch)でトリガーされた場合のみ実行 (Actions枠の消費削減)
    if: contains(github.event.head_commit.message, '[deploy]') || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # MarpによるMarkdownからHTMLへの自動ビルド (docsとdiscussionsを別々にビルド)
      - name: Marp Build (Markdown to HTML)
        run: |
          npx @marp-team/marp-cli@latest --html --theme-set ./docs/tiffany-theme.css -I ./docs -O ./docs
          npx @marp-team/marp-cli@latest --html --theme-set ./docs/tiffany-theme.css -I ./discussions -O ./discussions

      # リポジトリのルート全体をデプロイ対象としてアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # GitHub Pagesへデプロイ実行 (最新のv4を使用)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
