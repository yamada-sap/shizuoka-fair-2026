name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 手動での再デプロイ用

# GitHub Pagesへのデプロイに必要なアクセス権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行による競合を防ぐための設定
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # MarpによるMarkdownからHTMLへの自動ビルド (npxコマンドを直接実行)
      - name: Marp Build (Markdown to HTML)
        run: |
          npx @marp-team/marp-cli@latest --html --theme-set ./docs/portrait-theme.css -I ./docs -O ./output

      # outputフォルダの中身をデプロイ対象としてアップロード (最新のv3を使用)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

      # GitHub Pagesへデプロイ実行 (最新のv4を使用)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
