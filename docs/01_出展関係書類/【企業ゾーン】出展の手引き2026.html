<h2 id="6%E3%83%9A%E3%83%BC%E3%82%B8">6ページ</h2>
<ul>
<li>5 -<br />
4.一般規定<br />
1.出展に際して<br />
■一般規定<br />
1 出展者は自社小間内で出展に関する商品の展示販売及び、カタログ、パンフレット、製本見本などを自由に配<br />
布できます。スピーカーやAV機器などを使用する場合、他社に迷惑をかけるような宣伝はご遠慮ください。<br />
周囲の状況から他の出展者の展示・実演等に迷惑が生ずると判断される場合には、ボリュームを下げていただ<br />
くこともあります。趣旨をよくご理解のうえ、ご協力頂きますようお願い申し上げます。<br />
2 展示ブ-ス内の装飾・看板・商品展示などは、基礎小間を除いて出展者側でお願いします。<br />
3 出展物・看板などの装飾はブ-ス内に納めてください。<br />
4 自社ブースを離れての呼び込み、ビラ配り等は禁止です。<br />
5 出展者は本イベントの秩序、品位、信用の向上にご協力ください。<br />
2.出展物の保護<br />
1 各社小間内の出展物の保護については出展者自身が行ってください。また、天災その他不可抗力により<br />
発生した事故については、事務局はその損害賠償の責任を負いません。<br />
2 出展物の輸送及び展示期間中の保護については、必要に応じて保険をかけるなど適宜対策をとってください。<br />
3.事故防止及び責任<br />
1 出展者は展示物の搬入出、展示、実演、撤去などを行う際の事故の発生防止に努めてください。<br />
2 事務局は出展者が行う上記の作業について危険を感じ、処置が必要と認めた際は、事故の発生防止のための<br />
処置を命じ、その作業の制限、もしくは中止を求めることがあります。<br />
3 出展者自身の行為によって発生した事故または損傷については、当該出展者の責任となります。<br />
4.諸経費の負担<br />
1 電気、ガス、水道、通信を必要とする出展者は別項に規定する申し込み手続きをとり、<br />
指定期日までに必ず所定の料金をお支払いください。<br />
2 出展物の輸送、搬入出、展示、実演、撤去その他の出展者の行為に属する費用、出展物及び出展に対する保険<br />
は全て出展者の負担になります。<br />
5.貴重品の管理<br />
1 会期中には多数の来場者が訪れ、混雑が予想されます。貴重品の管理については、充分に注意してください。<br />
売上金及び各自の貴重品についても、盗難の防止に努め、各出展者の責任において管理してください。<br />
2 搬入・搬出時にも盗難等が発生する恐れがあります。搬入・搬出時にも貴重品については各出展者の責任に<br />
おいて管理してください。<br />
6.ブースの運営・常駐<br />
1 ブースを運営する際には、必ず事務局指定の「出展者パス(シールタイプ)」を付けてください。<br />
(各日、違うスタッフが対応する場合も必ず全員出展者パスを身につけてください。<br />
*後日郵送いたします。(11月上旬~中旬頃)<br />
2 ブース出展はイベント終了時刻まで必ず出展者が常駐するようにしてください。<br />
イベント開催中にブースを空けることがないようお願いいたします。<br />

また、控室内に荷物を置かないようお願いします。<br />
2 消防署の指導により、スタッフ・出展者用休憩所を含め展示会場内は全て禁煙となります。小間内の<br />

<h2 id="13%E3%83%9A%E3%83%BC%E3%82%B8">13ページ</h2>

<li>12 -<br />
7.基礎小間・施工規定<br />
■装飾・施工規定<br />
出展者の展示設計は自由ですが、展示場の構造や設備、消防法の規制等により制限がありますので、<br />
以下の事項を必ず守ってください。<br />
・造作物及び展示物の高さ は 1,800 mm までに 制限します 。<br />
尚、システムパネルのブースは、システムパネル2,100mm までに 制限します。<br />
・床荷重は5t/m2です。<br />
・床構造はアスファルトです。<br />
・小間内の構造物は全て床からの自立構造で実施してください。<br />
また、釘打ちやアンカーボルト等の施工は一切できません。<br />
・ブース小間内に天井または屋根をつけることは禁止されています。<br />
・会場設備に対して、破損、汚損することのないよう十分気をつけて施工を行ってください。<br />
・会場の柱、壁等建物を利用した装飾はできません。万一、破損した場合は出展者の負担で原状復帰を<br />
行ってください。<br />
・一般通路、避難経路確保のため、展示装飾及び展示物は小間の枠外にはみ出すことはできません。<br />
また、通路上に施設や表示等を設けることもできません。<br />
・のぼりの設置は特に規制を行いませんが、必ず小間内に設置し、隣接するブースへ迷惑がかからないように<br />
配慮をお願いします。<br />
・会場施設内へのポスター・チラシ類の貼り出しはできません。<br />
・壁面に画鋲・釘・接着剤セロテープ・両面テープなどは一切使用できません。ポスターやボードを貼る際は、<br />
大きさ・重さにもよりますが、S字フック+チェーンもしくはベルクロ(マジックテープ)を使用してください。<br />
※注意を無視し、跡が残った場合には弁償していただきます。<br />
・パネル等を展示する場合には、取付金具(S字フック+チェーン)・マジックテープを貸し出します。<br />
取付金具は搬入時に北館の出展事務局までお申し付けください。ただし数量に限りがございますので、ご<br />
承知ください。 取付金具は、搬出時にはブース内の出展事務局にご返却ください。<br />
マジックテープは必ずパネルから剥がして下さい。<br />
1.展示物の高さ制限<br />
2.重量制限<br />
3.床構造<br />
4.天井構造の禁止<br />

</ul>

8.安全管理<br />
■安全管理に伴う注意事項<br />
展示会場は消防法第8条の3により、防炎対象物品は防炎性能を有するものを使用し、一定基準の防炎管理を行う<br />
ことが義務付けられています。下記の項目について、基準の遵守をお願いします。<br />
尚、防災対象物品が防炎性能を有しないものを使用していた場合は、ただちに撤去していただきます。<br />
・発泡スチロール等の石油化学製品(ウレタン、ポリエステル、ナイロン等)や燃えやすい化学繊維は<br />
使用できません。 ※ウッドラック等は含まれません。<br />
・消火器、屋内消火栓、自動火災報知設備、非常ベル、誘導灯等を装飾物などにより、見えなくなったり<br />
機能を果たさなくなったりしないよう注意してください。<br />
防災設備の付近には障害となる陳列、工作物、その他物品を置かないでください。<br />
・安全管理の確認のため、装飾施工中及び開催当日、消防署による査察が行われます。<br />
その際、不適切とみなされた場合は変更または展示中止を要請されることがあります。<br />

■電気工事<br />
・館内の一般照明は、既設の照明によります。(平均照度600~700ルクス)<br />
・ブース内で電気工事を必要とする場合には必ず事前に備品申込シートにて申請をお願いします。<br />
工事は事務局にて行います。尚、開催当日の追加電気工事はできませんので、予めご了承ください。<br />
電気を希望される出展者様は別紙提出書類2 【 備品申込書 】 にご記入の上、 10月9日(金) までに<br />
事務局にご提出ください。<br />
・電気を使用する場合にはコンセント費用(種類による)をご負担いただきます。<br />
・使用電気容量については必ず申請してください。申請した電気容量を越えて使用した場合、周辺ブースに<br />
迷惑がかかりますのでご注意ください。<br />

●交流単相 100ボルト 60ヘルツ<br />
●交流単相 200ボルト 60ヘルツ<br />
●交流三相 200ボルト 60ヘルツ<br />

シートにご記入ください。尚、申請がない場合には24時間通電はしませんのでご承知ください。<br />
通電時間<br />
28日(金) 12:00~17:00<br />

10.危険物の持込・火気の使用<br />
■危険物<br />
・静岡市消防条例により、指定場所以外での「喫煙、裸火の使用」、「危険物の持ち込み」は禁止されています。<br />
やむを得ず危険物を持ち込む場合は、事務局にて消防署に申請し、「禁止行為解除申請」を受けますので、<br />
必ず提出書類3「危険物使用申請書」にご記入の上、10/10(金)までに事務局に申請をお願いします。<br />
■危険物の種類■<br />
・第一石油類(ガソリン、シンナー)<br />
・第二石油類(灯油、軽油)<br />
・第三石油類(A重油、マシン油)<br />
・第四石油類(スピンドル油、ギャー油、潤滑油、作動油)<br />
・動植物油類(変性アルコール、食用油)<br />
・その他の火気、危険物品、爆発物(高圧ガスボンベなど)<br />
注)消防にて危険行為解除申請を行い、危険物を持ち込む場合は小間内に消火器の設置が義務<br />
付けられています。消火器は各自でご用意ください。<br />
※天ぷらやフライをあげる際の、サラダ油等も危険物となりますのでご注意ください。<br />

展示物として持ち込む場合には、必ず事前に申し出てください。<br />
その際、燃料の持込みは必要最低とし、一般乗用車で5リットル以下とさせていただきます。<br />
